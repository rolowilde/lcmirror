name: CI

on:
  pull_request:
    paths:
      - "**.ya?ml"
      - "!*.example.ya?ml"
      - ".ansible-lint.ya?ml"
      - ansible.cfg
  push:
    paths:
      - "**.ya?ml"
      - "!*.example.ya?ml"
      - ".ansible-lint.ya?ml"
      - ansible.cfg
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
